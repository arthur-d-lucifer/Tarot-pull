<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塔羅抽抽</title>
    <style>
        /* 前衛全息魔法色票與變數 */
        :root {
            --space-black: #020108;
            --nebula-purple: #2b0b4a;
            --neon-magenta: #f000ff;
            --neon-cyan: #00e5ff;
            --gold-mystic: #e6c27a;
            --glass-bg: rgba(18, 10, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f4f0ff;
            --text-muted: #9c94b8;
            --card-ratio: 1.65;
            --success-glow: #00ffcc;
            --danger-glow: #ff0055;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--space-black);
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(240, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 70%, rgba(0, 229, 255, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.8;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 魔法星塵背景動畫 */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                radial-gradient(var(--text-muted) 1px, transparent 1px),
                radial-gradient(var(--gold-mystic) 1px, transparent 1px);
            background-size: 60px 60px, 90px 90px;
            background-position: 0 0, 30px 30px;
            opacity: 0.15;
            z-index: -1;
            animation: starDrift 100s linear infinite;
            pointer-events: none;
        }

        @keyframes starDrift {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100vh); }
        }

        h1 {
            color: transparent;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            background-clip: text;
            text-transform: uppercase;
            font-size: 2.5rem;
            letter-spacing: 10px;
            font-weight: 900;
            text-align: center;
            margin: 10px 0 30px 0;
            text-shadow: 0 0 30px rgba(240, 0, 255, 0.4);
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        /* 琉璃擬態面板 */
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -50%; width: 200%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-magenta), transparent);
            opacity: 0.7;
        }

        .section-title {
            color: var(--gold-mystic);
            font-size: 1.1rem;
            margin-bottom: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

        .section-title span {
            color: var(--neon-cyan);
            margin-right: 10px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* 魔法感核取按鈕 */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .magic-chip {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .magic-chip:hover {
            border-color: var(--neon-magenta);
            color: #fff;
            transform: translateY(-2px);
        }

        .magic-chip.checked {
            background: rgba(240, 0, 255, 0.15);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2), inset 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .magic-chip input { display: none; }

        /* 控制元件 */
        select {
            width: 100%;
            padding: 16px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 1.05rem;
            margin-bottom: 25px;
            outline: none;
            cursor: pointer;
            appearance: none;
            letter-spacing: 1px;
        }

        select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        button.magic-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(240, 0, 255, 0.1));
            color: #fff;
            border: 1px solid var(--neon-magenta);
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.4s;
            box-shadow: 0 0 20px rgba(240, 0, 255, 0.2);
        }

        button.magic-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        button.magic-btn:hover {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.3), rgba(240, 0, 255, 0.3));
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
            border-color: var(--neon-cyan);
        }

        button.magic-btn:hover::after { left: 150%; }
        button.magic-btn:active { transform: scale(0.98); }
        button.magic-btn:disabled { 
            background: rgba(0,0,0,0.5); border-color: #333; color: #555; box-shadow: none; cursor: not-allowed; 
        }

        /* 牌陣區域 */
        .spread-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            perspective: 1500px;
        }
        
        .card-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: calc(33.333% - 20px);
            min-width: 95px;
            max-width: 150px;
        }
        
        .slot-title {
            font-size: 0.85rem;
            color: var(--gold-mystic);
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(230, 194, 122, 0.3);
            padding-bottom: 5px;
            width: 100%;
        }

        /* 3D 全息卡牌特效 */
        .card {
            width: 100%;
            aspect-ratio: 1 / var(--card-ratio);
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.9s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), 0 0 20px rgba(0, 229, 255, 0.1);
            border-radius: 10px;
        }
        
        .card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), 0 0 30px var(--neon-cyan);
            transform: translateY(-5px) scale(1.02);
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
        }
        
        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border: 2px solid rgba(0, 229, 255, 0.4);
            box-sizing: border-box;
            border-radius: 10px;
        }

        .card-back {
            background: linear-gradient(135deg, #110522, #05020a);
            border: 2px solid var(--neon-magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(240, 0, 255, 0.2);
        }
        
        .card-back::after {
            content: '✧';
            color: var(--neon-cyan);
            font-size: 3.5rem;
            text-shadow: 0 0 20px var(--neon-cyan);
            animation: breathe 3s infinite alternate;
        }

        @keyframes breathe {
            from { text-shadow: 0 0 10px var(--neon-cyan); transform: scale(0.95); opacity: 0.7;}
            to { text-shadow: 0 0 25px var(--neon-cyan), 0 0 40px #fff; transform: scale(1.05); opacity: 1;}
        }

        .card-front { transform: rotateY(180deg); }

        .css-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1f1f2e, #000);
            height: 100%;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            text-align: center;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
        }
        .css-fallback .icon { font-size: 2.8rem; margin: 10px 0; text-shadow: 0 0 15px var(--neon-cyan); }
        .css-fallback .name { color: var(--gold-mystic); font-size: 0.9rem; font-weight: bold; line-height: 1.3; letter-spacing: 2px;}

        /* 解析報告區塊 */
        .result-area {
            display: none;
            margin-bottom: 50px;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .analysis-block {
            background: rgba(10, 5, 15, 0.6);
            border: 1px solid rgba(240, 0, 255, 0.2);
            border-left: 4px solid var(--neon-cyan);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 0 16px 16px 0;
            transition: all 0.3s;
            position: relative;
        }
        
        .analysis-block:hover {
            background: rgba(20, 10, 30, 0.8);
            border-left-color: var(--neon-magenta);
            box-shadow: 0 5px 25px rgba(240, 0, 255, 0.1);
        }
        
        .analysis-block h3 {
            color: #fff;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            letter-spacing: 2px;
            border-bottom: 1px dashed rgba(255,255,255,0.15);
            padding-bottom: 15px;
        }
        
        .analysis-content p {
            margin: 0 0 18px 0;
            font-size: 1.05rem;
            color: #d8d4e5;
            text-align: justify;
            line-height: 1.9;
            letter-spacing: 0.5px;
        }
        
        .insight-title {
            color: var(--neon-cyan);
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .upright { background: rgba(0, 255, 204, 0.15); color: var(--success-glow); border: 1px solid rgba(0, 255, 204, 0.4); }
        .reversed { background: rgba(255, 0, 85, 0.15); color: var(--danger-glow); border: 1px solid rgba(255, 0, 85, 0.4); }
        
        .dimension-item {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 2px solid var(--gold-mystic);
            box-shadow: inset 0 0 15px rgba(230, 194, 122, 0.05);
        }
        
        .dimension-title { 
            color: var(--gold-mystic); 
            font-weight: bold; 
            margin-bottom: 10px; 
            display: block; 
            font-size: 1.05rem; 
            border-bottom: 1px dashed rgba(230, 194, 122, 0.3);
            padding-bottom: 6px;
        }

        #backToTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            color: #fff;
            border: 2px solid rgba(255,255,255,0.8);
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 5px 25px rgba(240, 0, 255, 0.5);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #backToTopBtn:hover { transform: scale(1.1) rotate(360deg); }
        #backToTopBtn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="container">
    <h1>塔羅抽抽</h1>
    
    <div class="glass-panel" id="ritualBox" style="margin-bottom: 10px;">
        <div class="section-title"><span>✦</span> 意圖對齊與邊界設定</div>
        <div style="color: #ccc; font-size: 0.95rem; margin-bottom: 10px;"><strong>1. 淨化歸零：</strong> 暫時休眠外在的防衛機制，專注於當下的呼吸與潛意識共振。</div>
        <div style="color: #ccc; font-size: 0.95rem; margin-bottom: 10px;"><strong>2. 邊界收斂：</strong> 潛意識無法回應模糊的投射，請將意圖具象化至特定的人事物。</div>
        <div style="color: #ccc; font-size: 0.95rem;"><strong>3. 矩陣授權：</strong> 手動設定您欲進行深層個體化剖析的決策維度。</div>
    </div>

    <div class="glass-panel" id="controlPanel">
        <div class="section-title"><span>I.</span> 鎖定分析維度 (多維交叉，可複選)</div>
        <div class="checkbox-group" id="dimensions">
            <label class="magic-chip"><input type="checkbox" value="工作與事業" onchange="toggleCheck(this)"> 🏢 工作與事業</label>
            <label class="magic-chip"><input type="checkbox" value="財務與資源" onchange="toggleCheck(this)"> 💰 財務與資源</label>
            <label class="magic-chip"><input type="checkbox" value="情感與人際" onchange="toggleCheck(this)"> 🤝 情感與人際</label>
            <label class="magic-chip"><input type="checkbox" value="身心與健康" onchange="toggleCheck(this)"> 🧬 身心與健康</label>
            <label class="magic-chip"><input type="checkbox" value="靈性與潛意識" onchange="toggleCheck(this)"> 👁️ 靈性與潛意識</label>
        </div>

        <div class="section-title"><span>II.</span> 選擇戰略陣型 (時間流與空間佈局)</div>
        <select id="spreadType" onchange="renderEmptySlots()">
            <option value="1">單點擊破 (1張) - 直擊核心痛點與破局關鍵</option>
            <option value="2">二元辯證 (2張) - 表層意識 vs 潛意識陰影</option>
            <option value="3" selected>時間軸線 (3張) - 過去業力、現在焦慮、未來推演</option>
            <option value="5">決策岔路 (5張) - 方案A vs 方案B 的殘酷代價評估</option>
            <option value="7">六芒星陣 (7張) - 內外環境與阻礙的深度剖析</option>
            <option value="10">賽爾特十字 (10張) - 命運因果與最終結局的終極診斷</option>
        </select>

        <button id="drawBtn" class="magic-btn" onclick="initSpread()">啟動共振 · 洗牌發牌</button>
    </div>

    <div id="spreadArea" class="spread-area"></div>

    <div id="resultArea" class="result-area glass-panel">
        <h2 style="color: var(--neon-cyan); text-align: center; border-bottom: 1px solid rgba(0,229,255,0.3); padding-bottom: 15px; margin-top:0; letter-spacing: 4px; text-shadow: 0 0 15px rgba(0,229,255,0.4);">高階戰略診斷報告</h2>
        <p style="text-align: center; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 35px; letter-spacing: 1px;">( 警告：以下分析將繞過表層防衛機制，直擊底層心理原型 )</p>
        <div id="dynamicAnalysis"></div>
    </div>
</div>

<button id="backToTopBtn" onclick="scrollToTop()">⚚</button>

<script>
    const cdnBaseUrl = "https://cdn.jsdelivr.net/gh/howech/tarot_images@master/cards/";
    
    // ============================================================================
    // 78 張牌心理學深度語意庫 (完全捨棄表面解釋，純淨的榮格與精神動力學深度剖析)
    // ============================================================================
    const majorDict = {
        0: { u: "你深知現有框架令人窒息，這不是衝動，而是自性（Self）在自救。大膽跳躍吧，潛意識的安全網會在半空中展開。", r: "你極度渴望改變，卻死抓著現有安全感不放，用各種現實考量來掩飾內心對跨出舒適圈的深層恐懼。" },
        1: { u: "你手邊早就具備了破局的所有心理資源，別再等待完美時機。現在就是將意識意圖具現化的絕對時刻。", r: "你陷入了冒牌者症候群，或是用華麗的自我欺騙掩飾行動力的匱乏。誠實盤點真實能力，做不到就承認侷限。" },
        2: { u: "停止向外尋求數據與認同。你的潛意識早就知曉答案，切斷雜音，臣服於你第一秒的直覺洞察。", r: "你刻意壓抑直覺，強迫自己接受一個令人反胃的現狀。表面看似平靜，但底層的心理陰影即將失控爆發。" },
        3: { u: "現在你需要的是滋養而非鞭策。去享受物質、感受美、善待身體。在放鬆的狀態下，創造力自然會孕育。", r: "你用令人窒息的關心或控制欲來掩飾自己的不安全感。這不叫負責，這叫邊界侵犯。學會放手讓別人承擔課題。" },
        4: { u: "混亂的局面需要絕對的鐵腕終結。收起氾濫的投射，建立嚴格的心理界線與外在秩序，用理性奪回主導權。", r: "你的控制慾正在摧毀團隊或關係。你變得固執僵化，聽不進反對意見，微觀管理只會加速現實結構的崩潰。" },
        5: { u: "不要試圖自己發明輪子。放下小我（Ego）的傲慢，虛心向既有體制、專業顧問或前人的智慧求助，這是破局捷徑。", r: "你被僵化的教條或盲從心態綁架。你明明知道這套規則充滿毒性，卻不敢做那個發出質疑的覺醒者。" },
        6: { u: "面臨岔路，你必須選擇那個讓靈魂共鳴的選項。忠於最真實的價值觀，整合內在的對立面，即使那看起來風險較高。", r: "你在關係或合作中委曲求全，只因害怕失去利益。價值觀已嚴重斷裂，別再為錯誤的心理投射找藉口。" },
        7: { u: "你處於極端拉扯的心理矛盾中。不要試圖消滅情緒，而是駕馭它。鎖定目標，展現絕對的自律與意識集中力。", r: "你失去了內在方向盤的控制權。情緒失控或被外力撞得人仰馬翻。立刻踩剎車，找回心理秩序前別做重大推進。" },
        8: { u: "真正的力量是包容。面對眼前的危機或難搞的人，用極度的耐心、同理心與內在溫柔去降伏它，以柔克剛。", r: "你內心的陰影野獸失控了。焦慮或憤怒正在吞噬理智；又或者你感到極度軟弱，完全喪失了保護自己的心理界線。" },
        9: { u: "你現在最需要的是絕對的孤獨。關閉外在通訊，往內深挖痛點。在個體化的安靜歷程中，你會找到那盞破局的燈。", r: "你以需要空間為藉口，實則在逃避現實責任。過度的孤立只會讓你陷入更深的偏執盲點，你需要外界拉你一把。" },

    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    // 初始化載入
    window.onload = () => { renderEmptySlots(); };

    // 滾動監聽 (FAB)
    window.onscroll = function() {
        const btn = document.getElementById("backToTopBtn");
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btn.style.display = "flex";
            setTimeout(() => { btn.style.opacity = "1"; btn.style.transform = "scale(1)"; }, 10);
        } else {
            btn.style.opacity = "0";
            btn.style.transform = "scale(0.8)";
            setTimeout(() => { if(document.body.scrollTop <= 300 && document.documentElement.scrollTop <= 300) btn.style.display = "none"; }, 300);
        }
    };

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 系統重置
    function resetSystem() {
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('dynamicAnalysis').innerHTML = '';
        
        const btn = document.getElementById('drawBtn');
        btn.innerText = '啟動共振 · 洗牌發牌';
        btn.onclick = initSpread; 
        btn.disabled = false;
        
        document.getElementById('ritualBox').style.display = 'block';
        setTimeout(() => { document.getElementById('ritualBox').style.opacity = '1'; }, 10);
        
        currentSpread = [];
        flippedCount = 0;
        
        renderEmptySlots(); 
        scrollToTop();      
    }

    // 動態渲染牌槽
    function renderEmptySlots() {
        const type = document.getElementById('spreadType').value;
        currentPositions = spreadLayouts[type];
        const spreadArea = document.getElementById('spreadArea');
        spreadArea.innerHTML = '';
        
        currentPositions.forEach((posName) => {
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            if(type === '7' || type === '10') slot.style.width = 'calc(25% - 20px)'; 
            if(type === '1') slot.style.width = '250px';

            slot.innerHTML = `<div class="slot-title">${posName}</div><div class="card"><div class="card-face card-back"></div></div>`;
            spreadArea.appendChild(slot);
        });
    }

    function toggleCheck(input) {
        input.parentElement.classList.toggle('checked', input.checked);
    }

    // 發牌邏輯
    function initSpread() {
        const checkedDims = Array.from(document.querySelectorAll('#dimensions input:checked'));
        if(checkedDims.length === 0) {
            alert('意識提示：請至少授權一個分析維度，否則潛意識無法啟動深層語意共振。');
            return;
        }

        document.getElementById('ritualBox').style.opacity = '0';
        setTimeout(() => document.getElementById('ritualBox').style.display = 'none', 500);
        document.getElementById('resultArea').style.display = 'none';
        
        const spreadArea = document.getElementById('spreadArea');
        spreadArea.innerHTML = '';
        
        const btn = document.getElementById('drawBtn');
        btn.innerText = "潛意識共振中... 正在開啟榮格原型矩陣";
        btn.disabled = true;
        
        flippedCount = 0;
        currentSpread = [];

        currentPositions.forEach((posName, i) => {
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            const type = document.getElementById('spreadType').value;
            if(type === '7' || type === '10') slot.style.width = 'calc(25% - 20px)'; 
            if(type === '1') slot.style.width = '250px';
            
            slot.innerHTML = `
                <div class="slot-title">${posName}</div>
                <div class="card" id="card${i}" onclick="flipCard(${i})">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front" id="front${i}"></div>
                </div>
            `;
            spreadArea.appendChild(slot);
        });

        setTimeout(() => {
            let tempDeck = [...deck];
            for (let i = 0; i < currentPositions.length; i++) {
                const array = new Uint32Array(1);
                window.crypto.getRandomValues(array);
                const randomIndex = array[0] % tempDeck.length;
                const isReversed = (array[0] % 2 === 0);
                
                const drawnCard = tempDeck.splice(randomIndex, 1)[0];
                currentSpread.push({ ...drawnCard, isReversed: isReversed, position: currentPositions[i] });

                const frontEl = document.getElementById(`front${i}`);
                const statusText = isReversed ? '▼ 逆位' : '▲ 正位';
                
                frontEl.innerHTML = `
                    <img src="${drawnCard.img}" 
                         alt="${drawnCard.name}" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="css-fallback" style="display:none;">
                        <div class="icon" style="${isReversed ? 'transform: rotate(180deg);' : ''}">${drawnCard.icon}</div>
                        <div class="name">${drawnCard.name}</div>
                        <div style="color: ${isReversed ? 'var(--danger-glow)' : 'var(--success-glow)'}; font-size: 0.8rem; margin-top: 10px; font-weight: bold; letter-spacing: 2px;">${statusText}</div>
                    </div>
                `;
            }
            btn.innerText = "連結確立：請點擊牌背揭曉潛意識投射";
        }, 800);
    }

    function flipCard(index) {
        const cardEl = document.getElementById(`card${index}`);
        if (cardEl.classList.contains('flipped')) return;

        const cardData = currentSpread[index];
        if (cardData.isReversed) cardEl.classList.add('reversed');
        cardEl.classList.add('flipped');
        
        flippedCount++;
        if (flippedCount === currentSpread.length) {
            document.getElementById('drawBtn').innerText = "深層意識與多維度矩陣解析中...";
            setTimeout(generateDeepAnalysis, 1500); 
        }
    }

    // 核心：超高密度不重複解析引擎
    function generateDeepAnalysis() {
        const selectedDims = Array.from(document.querySelectorAll('#dimensions input:checked')).map(cb => cb.value);
        const dynamicAnalysis = document.getElementById('dynamicAnalysis');
        let html = '';

        // 【防重複機制 2.0】：每個維度各配備 20 種以上的句型庫，將其完全洗牌後做為堆疊 (Stack) 彈出
        let usedTemplates = {};
        selectedDims.forEach(dim => {
            if (dimTemplates[dim]) {
                usedTemplates[dim] = {
                    'u': shuffleArray([...dimTemplates[dim].u]),
                    'r': shuffleArray([...dimTemplates[dim].r])
                };
            }
        });

        currentSpread.forEach((card, index) => {
            const statusClass = card.isReversed ? 'reversed' : 'upright';
            const statusText = card.isReversed ? '逆位' : '正位';
            const stateKey = card.isReversed ? 'r' : 'u';
            
            // 提取核心痛點
            let corePsychology = "";
            if (card.type === 'Major') {
                corePsychology = majorDict[card.num][stateKey];
            } else {
                corePsychology = minorDict[card.suit][card.num][stateKey];
            }

            // 提取短標題做為動態合成參數 (取第一句)
            let shortKey = corePsychology.includes('。') ? corePsychology.split('。')[0] : corePsychology;

            let positionContext = `<span class="insight-title">📍 【陣型定位】：${card.position}</span>這張牌出現在這個位置，意味著這${card.isReversed ? '正是你心理防衛機制正在強烈排斥、或是潛意識刻意壓抑的深層陰影' : '是你現在唯一能緊緊抓住、用來強行破局的核心心理籌碼'}。`;

            // 動態融入選擇的維度 (透過 pop 取出絕對不重複的句型)
            let dimText = '';
            selectedDims.forEach(dim => {
                let actionAdvice = '';
                
                if (usedTemplates[dim] && usedTemplates[dim][stateKey].length > 0) {
                    let template = usedTemplates[dim][stateKey].pop();
                    actionAdvice = template.replace(/{key}/g, shortKey);
                } else {
                    // 極端保底機制 (萬一抽超過20張同屬性的牌，這在最多10張牌的牌陣中數學上不可能發生)
                    actionAdvice = `面對「${shortKey}」，請立刻調整你的高階戰略步調與內在認知。`;
                }
                
                dimText += `
                    <div class="dimension-item">
                        <span class="dimension-title">對齊維度：[ ${dim} ]</span>
                        ${actionAdvice}
                    </div>
                `;
            });

            html += `
                <div class="analysis-block">
                    <h3>${card.name} <span class="status-badge ${statusClass}">${statusText}</span></h3>
                    <div class="analysis-content">
                        <p>${positionContext}</p>
                        <p><span class="insight-title">👁️ 【深層心理剖析】：</span>${corePsychology}</p>
                        ${dimText}
                    </div>
                </div>
            `;
        });

        dynamicAnalysis.innerHTML = html;
        document.getElementById('resultArea').style.display = 'block';
        
        const btn = document.getElementById('drawBtn');
        btn.innerText = "重啟軌跡 (釋放當下執念並開啟新局)";
        btn.onclick = resetSystem; 
        btn.disabled = false;
        
        document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
